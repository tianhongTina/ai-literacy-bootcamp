<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <!-- Background circle -->
  <circle cx="200" cy="160" r="140" fill="#EEF2FF" />

  <!-- AI Brain icon -->
  <g transform="translate(140, 60)">
    <!-- Brain outline -->
    <path d="M60 20C45 20 35 30 35 45C25 45 15 55 15 68C15 78 20 86 28 90C25 95 24 102 28 108C32 115 40 118 48 117C52 125 60 130 70 130C80 130 88 125 92 117C100 118 108 115 112 108C116 102 115 95 112 90C120 86 125 78 125 68C125 55 115 45 105 45C105 30 95 20 80 20C75 20 67 20 60 20Z"
          stroke="#4F46E5" stroke-width="3" fill="#E0E7FF" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Neural connections -->
    <circle cx="50" cy="65" r="5" fill="#4F46E5"/>
    <circle cx="90" cy="65" r="5" fill="#4F46E5"/>
    <circle cx="70" cy="50" r="5" fill="#6366F1"/>
    <circle cx="70" cy="85" r="5" fill="#6366F1"/>
    <circle cx="55" cy="100" r="4" fill="#818CF8"/>
    <circle cx="85" cy="100" r="4" fill="#818CF8"/>
    <line x1="50" y1="65" x2="70" y2="50" stroke="#6366F1" stroke-width="1.5"/>
    <line x1="90" y1="65" x2="70" y2="50" stroke="#6366F1" stroke-width="1.5"/>
    <line x1="50" y1="65" x2="70" y2="85" stroke="#6366F1" stroke-width="1.5"/>
    <line x1="90" y1="65" x2="70" y2="85" stroke="#6366F1" stroke-width="1.5"/>
    <line x1="70" y1="85" x2="55" y2="100" stroke="#818CF8" stroke-width="1.5"/>
    <line x1="70" y1="85" x2="85" y2="100" stroke="#818CF8" stroke-width="1.5"/>
  </g>

  <!-- People icons -->
  <!-- Person 1 - left -->
  <g transform="translate(70, 200)">
    <circle cx="20" cy="10" r="12" fill="#C7D2FE"/>
    <path d="M5 45C5 32 12 25 20 25C28 25 35 32 35 45" stroke="#6366F1" stroke-width="2.5" fill="#DDD6FE" stroke-linecap="round"/>
  </g>

  <!-- Person 2 - right -->
  <g transform="translate(290, 200)">
    <circle cx="20" cy="10" r="12" fill="#C7D2FE"/>
    <path d="M5 45C5 32 12 25 20 25C28 25 35 32 35 45" stroke="#6366F1" stroke-width="2.5" fill="#DDD6FE" stroke-linecap="round"/>
  </g>

  <!-- Connection lines from brain to people -->
  <path d="M170 185 Q130 210 100 220" stroke="#A5B4FC" stroke-width="2" stroke-dasharray="4 3" fill="none"/>
  <path d="M230 185 Q270 210 300 220" stroke="#A5B4FC" stroke-width="2" stroke-dasharray="4 3" fill="none"/>

  <!-- Floating elements -->
  <!-- Chat bubble -->
  <g transform="translate(55, 100)">
    <rect x="0" y="0" width="40" height="28" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="10" y1="9" x2="30" y2="9" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="16" x2="25" y2="16" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <polygon points="12,28 18,28 14,35" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" stroke-linejoin="round"/>
  </g>

  <!-- Lightbulb -->
  <g transform="translate(295, 90)">
    <path d="M15 5C8 5 3 10 3 17C3 22 6 25 9 28L9 32L21 32L21 28C24 25 27 22 27 17C27 10 22 5 15 5Z" fill="#FEF9C3" stroke="#EAB308" stroke-width="1.5"/>
    <line x1="10" y1="35" x2="20" y2="35" stroke="#EAB308" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="11" y1="38" x2="19" y2="38" stroke="#EAB308" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Data chart icon -->
  <g transform="translate(280, 155)">
    <rect x="0" y="0" width="36" height="28" rx="4" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
    <rect x="6" y="14" width="5" height="10" fill="#10B981" rx="1"/>
    <rect x="14" y="8" width="5" height="16" fill="#34D399" rx="1"/>
    <rect x="22" y="11" width="5" height="13" fill="#6EE7B7" rx="1"/>
  </g>

  <!-- Sparkles -->
  <g fill="#4F46E5" opacity="0.6">
    <circle cx="120" cy="70" r="3"/>
    <circle cx="280" cy="75" r="2.5"/>
    <circle cx="330" cy="140" r="2"/>
    <circle cx="75" cy="160" r="2.5"/>
  </g>
</svg>
